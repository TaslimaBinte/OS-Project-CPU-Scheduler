<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1> 🏽  CPU Scheduling Simulator</h1>

    <div id="button-container">
        <button id="add-process">Add Process</button>
        <button id="reduce-process">Reduce Process</button>
        <label>Time Quantum for RR:</label>
        <input type="number" id="time-quantum" placeholder="0">
        <button id="run">RUN</button>
        <button id="reset">RESET</button>
        <button id="show">SHOW</button>

        <div id="results">
            <h2>Results</h2>
            <p id="tat-result"></p>
            <p id="wt-result"></p>
        </div>
    </div>

    <div id="process-container">
        <div class="process" id="process-1">
            <label>P1</label>
            <input type="number" placeholder="Arrival Time" class="arrival-time">
            <input type="number" placeholder="Burst Time" class="burst-time">
            <input type="number" placeholder="Priority" class="priority">
        </div>
    </div>
    <div id="results-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <h2>Algorithm Performance</h2>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Algorithm</th>
                        <th>Average TAT</th>
                        <th>Average WT</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>





    <script src="script.js"></script>
</body>
</html>
